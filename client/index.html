<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-with" initial-scale="1.0">
	<title>chat</title>
	<script></script>
	<script type="module">
		import {io} from "https://cdn.socket.io/4.8.1/socket.io.esm.min.js";

		const socket = io();

		const form = document.getElementById("form")
		const input = document.getElementById("input")
		const msgs = document.getElementById("messages")

		socket.on("chat message", (msg) => {
			const item = `<li>${msg}</li>`
			msgs.insertAdjacentHTML('beforeend', item)
		})

		form.addEventListener("submit", (e) => {
			e.preventDefault()

			if (input.value) {
				socket.emit("chat message", input.value)
				input.value = ""
			}
		})
	</script>
	<style>
		*,
		*::before,
		*::after {
			box-sizing: border-box;
		}

		:root {
			color-scheme: light dark;
		}

		body {
			margin: 0;
			display: grid;
			place-content: center;
			height: 100vh;
			padding: 30px;
			grid-template-rows: 1fr;
		}

		#messages {
			list-style-type: none;
			margin: 0;
			padding: 0;
		}

		#messages>li {
			padding: .5rem 1rem;
			background: #000;
		}

		#chat {
			border: 1px solid #ccc;
			border-radius: 4px;
			overflow: hidden;
			width: 350px;
			height: 100%;
			position: relative;
		}

		#form {
			bottom: 0;
			display: flex;
			height: 40px;
			left: 0;
			padding: 4px;
			position: absolute;
			right: 0;
		}

		input {
			border: 1px solid #ccc;
			flex: 1;
			margin: 4px;
			padding: 0 5px;
		}

		#input:focus {
			outline: 0;
		}

		@media (max-width: 768px) {
			#chat {
				width: 90vw;
			}
		}
	</style>
</head>

<body>
	<section id="chat">
		<ul id="messages"></ul>
		<form id="form">
			<input type"message" name="message" id="input" autocomplete="off" />
			<button>ok</button>
		</form>
	</section>
</body>

</html>
