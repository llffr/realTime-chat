	<title>chat</title>
	<style>
		*,
		*::before,
		*::after {
			box-sizing: border-box;
		}

		:root {
			color-scheme: light dark;
		}

		body {
			margin: 0;
			display: grid;
			place-content: center;
			height: 100vh;
			padding: 30px;
			grid-template-rows: 1fr;

			border-radius: 4px;
			overflow: hidden;
			width: 350px;
			height: 100%;
			position: relative;
		}
	</style>
</head>
